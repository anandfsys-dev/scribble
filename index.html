<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Scribble — Hand-drawn Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">

      <!-- ── Top Toolbar ─────────────────────────────────────────── -->
      <div class="toolbar">

        <button id="tool-select" class="tool-btn active" title="Select (1)">
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
            <path d="m13 13 6 6"/>
          </svg>
          <span class="tool-key">1</span>
        </button>

        <div class="toolbar-sep"></div>

        <button id="tool-rectangle" class="tool-btn" title="Rectangle (2)">
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="18" x="3" y="3" rx="2"/>
          </svg>
          <span class="tool-key">2</span>
        </button>

        <button id="tool-ellipse" class="tool-btn" title="Ellipse (3)">
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
          </svg>
          <span class="tool-key">3</span>
        </button>

        <div class="toolbar-sep"></div>

        <button id="tool-line" class="tool-btn" title="Line (4)">
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" x2="19" y1="12" y2="12"/>
          </svg>
          <span class="tool-key">4</span>
        </button>

        <button id="tool-arrow" class="tool-btn" title="Arrow (5)">
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 19 7-7-7-7"/>
            <path d="M19 12H5"/>
          </svg>
          <span class="tool-key">5</span>
        </button>

        <div class="toolbar-sep"></div>

        <button id="tool-pen" class="tool-btn" title="Draw (6)">
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
          </svg>
          <span class="tool-key">6</span>
        </button>

        <button id="tool-text" class="tool-btn" title="Text (7)">
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 7V4h16v3"/>
            <path d="M9 20h6"/>
            <path d="M12 4v16"/>
          </svg>
          <span class="tool-key">7</span>
        </button>

        <div class="toolbar-sep"></div>

        <button id="tool-frame" class="tool-btn" title="Frame (F)">
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <span class="tool-key">F</span>
        </button>

      </div>

      <!-- ── Properties Panel ─────────────────────────────────────── -->
      <div class="properties-panel">

        <!-- Stroke Color -->
        <div class="panel-section">
          <span class="panel-label">Stroke</span>
          <div id="stroke-palette" class="swatch-row">
            <button class="color-btn active" data-color-index="0"></button>
            <button class="color-btn" data-color-index="1"></button>
            <button class="color-btn" data-color-index="2"></button>
            <button class="color-btn" data-color-index="3"></button>
            <button class="color-btn" data-color-index="4"></button>
          </div>
        </div>

        <div class="panel-sep"></div>

        <!-- Fill Color -->
        <div class="panel-section">
          <span class="panel-label">Fill</span>
          <div id="fill-palette" class="swatch-row">
            <button class="fill-btn active" data-color-index="0"></button>
            <button class="fill-btn" data-color-index="1"></button>
            <button class="fill-btn" data-color-index="2"></button>
            <button class="fill-btn" data-color-index="3"></button>
            <button class="fill-btn" data-color-index="4"></button>
          </div>
        </div>

        <div class="panel-sep"></div>

        <!-- Stroke Width -->
        <div class="panel-section">
          <span class="panel-label">Width</span>
          <div class="width-row">
            <button class="width-btn active" data-width="1">
              <div style="width:16px;height:1px;background:currentColor;border-radius:1px;"></div>
            </button>
            <button class="width-btn" data-width="3">
              <div style="width:16px;height:3px;background:currentColor;border-radius:2px;"></div>
            </button>
            <button class="width-btn" data-width="5">
              <div style="width:16px;height:5px;background:currentColor;border-radius:3px;"></div>
            </button>
          </div>
        </div>

        <!-- Text Styles -->
        <div id="text-options" class="panel-section">
          <div class="panel-sep"></div>
          <span class="panel-label">Text Color</span>
          <div class="swatch-row">
            <button class="text-color-btn active" style="background-color:#1e1e1e" data-color="#1e1e1e" data-color-index="0"></button>
            <button class="text-color-btn" style="background-color:#e03131" data-color="#e03131" data-color-index="1"></button>
            <button class="text-color-btn" style="background-color:#2f9e44" data-color="#2f9e44" data-color-index="2"></button>
            <button class="text-color-btn" style="background-color:#1971c2" data-color="#1971c2" data-color-index="3"></button>
            <button class="text-color-btn" style="background-color:#f08c00" data-color="#f08c00" data-color-index="4"></button>
          </div>
          <span class="panel-label">Size</span>
          <div style="display:flex;gap:4px;">
            <button class="font-size-btn" data-size="16">S</button>
            <button class="font-size-btn active" data-size="24">M</button>
            <button class="font-size-btn" data-size="32">L</button>
            <button class="font-size-btn" data-size="48">XL</button>
          </div>
        </div>

        <div class="panel-hint">Hold stroke end → Auto-Shape</div>

      </div>

      <!-- ── Actions Panel ────────────────────────────────────────── -->
      <div class="actions-panel">

        <button id="btn-reset-view" class="action-btn action-btn-view" title="Reset View (100%)">
          100%
        </button>

        <button id="btn-theme" class="action-btn action-btn-icon" title="Toggle Theme">
          <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2m-7.07-14.07 1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2m-4.93-7.07-1.41 1.41M6.34 17.66l-1.41 1.41"/>
          </svg>
          <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
          </svg>
        </button>

        <button id="btn-clear" class="action-btn action-btn-danger" title="Clear Canvas">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
            <line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>
          </svg>
          Clear
        </button>

        <button id="btn-export-json" class="action-btn" title="Export JSON">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" x2="12" y1="15" y2="3"/>
          </svg>
          Export
        </button>

        <button id="btn-import-json" class="action-btn action-btn-primary" title="Import JSON">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" x2="12" y1="3" y2="15"/>
          </svg>
          Import
        </button>

        <input type="file" id="input-import-json" accept=".json" class="hidden">
      </div>

      <!-- ── Frames Panel ───────────────────────────────────────────── -->
      <div id="frames-panel" class="frames-panel">
        <div class="frames-panel-header">
          <span class="frames-panel-title">Frames</span>
          <button id="btn-present" class="btn-present" title="Start Presentation">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none">
              <polygon points="5,3 19,12 5,21"/>
            </svg>
            Present
          </button>
        </div>
        <div id="frames-list" class="frames-list"></div>
        <p id="frames-empty" class="frames-empty">No frames yet.<br>Use Frame tool (F) to draw one.</p>
        <button id="btn-clear-frames" class="btn-clear-frames" style="display:none">Clear all frames</button>
      </div>

      <!-- ── Presentation Blur Overlay ────────────────────────────────── -->
      <div id="pres-dim-overlay" class="pres-dim-overlay" style="display:none"></div>

      <!-- ── Presentation Overlay ───────────────────────────────────── -->
      <div id="presentation-overlay" class="presentation-overlay hidden">
        <div class="pres-top-bar">
          <span id="pres-frame-name" class="pres-frame-name"></span>
          <span id="pres-counter" class="pres-counter"></span>
          <button id="btn-exit-present" class="pres-exit-btn">✕ Exit</button>
        </div>
        <button id="btn-prev-frame" class="pres-nav-btn pres-nav-prev" title="Previous (←)">‹</button>
        <button id="btn-next-frame" class="pres-nav-btn pres-nav-next" title="Next (→)">›</button>
      </div>

      <!-- ── Canvas ────────────────────────────────────────────────── -->
      <canvas id="canvas"></canvas>

    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
